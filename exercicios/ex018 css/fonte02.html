<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes externas</title>
    <style>
        @font-face {
            font-family:'super kidpop'; ;
            src: url('fonts/super kidpop.ttf') format(truetype);
            font-weight: normal;
            font-style: normal;
            /*
            Tipos de Format()
            -opentype(otf)
            -truetype(ttf)
            embedded-opentype(eot)
            truetype-aat(ttc)
            svg(svg)
            */
        }
     body{
        font-family: Arial, Helvetica, sans-serif;
     }   
     h1{
        font-family: 'super kidpop', Times, serif;
        font-weight: normal;
        font-size: 3em;
     }
    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Accusamus reprehenderit in vitae. Fuga sapiente voluptates soluta nam quia atque natus, modi dolores, eveniet eos a, fugit maiores inventore ab magnam?</p>
    </p>
</body>
</html>
