<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <STyle>
        /*   SELETORES PERSONALIZADOS
            #    = id
            .    = class
            :    = pseudo-classe
            ::   = pseudo-elemento
            >    = filho direto
            (espaço) = descendente
        */
        body{
            background-color: lightseagreen;
            font-family: Arial, Helvetica, sans-serif;
        }
        a{
            color: black;
            text-decoration: none;
            font-weight: bold;
        }
        a:visited{
            color: red;
        }
        a:hover{
            color: black;
            text-decoration: underline;
        }
    </STyle>
</head>
<body>
    <h1>personalizando Links</h1>
    <ul>
        <li><a href="https://github.com/JoasNeves00/CadastroFrontEnd" target="_blank">Repositório Github</a></li>
        <li><a href="https://www.youtube.com/" target="_blank">Canal do YouTube</a></li>
        <li><a href="https://seusite.com/" target="_blank">Seu site pessoal</a></li>
    </ul>
    
</body>
</html>
